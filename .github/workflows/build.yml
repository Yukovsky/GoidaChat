name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # required for gh release create

    steps:
      - name: Checkout GoidaChat
        uses: actions/checkout@v4
        with:
          path: GoidaChat

      - name: Checkout GoidaVote (compile-only dependency for /votemute)
        uses: actions/checkout@v4
        with:
          repository: Yukovsky/GoidaVote
          path: GoidaVote

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: |
          chmod +x GoidaChat/gradlew
          chmod +x GoidaVote/gradlew

      - name: Build GoidaVote
        run: ./gradlew build
        working-directory: GoidaVote

      - name: Build
        run: ./gradlew build
        working-directory: GoidaChat

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoidaChat-${{ github.sha }}
          path: GoidaChat/build/libs/*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: GoidaChat
        run: |
          gh release create "${{ github.ref_name }}" \
            build/libs/*.jar \
            --title "GoidaChat ${{ github.ref_name }}" \
            --generate-notes
