modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/Yukovsky/GoidaChat/issues"

[[mods]]
    modId = "${mod_id}"
    version = "${mod_version}"
    displayName = "${mod_name}"
    description = "${mod_description}"
    authors = "${mod_authors}"
    # Server-side only — clients do not need this mod installed.
    displayTest = "IGNORE_SERVER_VERSION"

[[dependencies.goidachat]]
    modId = "neoforge"
    type = "required"
    versionRange = "[21.1.228,)"
    ordering = "NONE"
    side = "SERVER"

[[dependencies.goidachat]]
    modId = "minecraft"
    type = "required"
    versionRange = "[1.21.1,1.22)"
    ordering = "NONE"
    side = "SERVER"

[[dependencies.goidachat]]
    modId = "luckperms"
    type = "optional"
    versionRange = "[5.0,)"
    ordering = "NONE"
    side = "SERVER"

[[dependencies.goidachat]]
    modId = "hwid"
    type = "optional"
    versionRange = "[1,)"
    ordering = "AFTER"
    side = "SERVER"

# Optional — /votemute integrates with GoidaVote. Load it AFTER GoidaVote so its poll API is
# ready; GoidaChat works fine without it (the vote commands are simply not registered).
[[dependencies.goidachat]]
    modId = "goidavote"
    type = "optional"
    versionRange = "[1.0,)"
    ordering = "AFTER"
    side = "SERVER"

# Optional — voice mute integrates with Simple Voice Chat.
[[dependencies.goidachat]]
    modId = "voicechat"
    type = "optional"
    ordering = "AFTER"
    side = "SERVER"
